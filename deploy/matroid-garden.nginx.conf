server {
    listen 80;
    listen [::]:80;
    server_name www.matroid-garden.com;
    return 301 https://matroid-garden.com$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name matroid-garden.com;
    return 301 https://matroid-garden.com$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.matroid-garden.com;

    ssl_certificate /etc/letsencrypt/live/matroid-garden.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/matroid-garden.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://matroid-garden.com$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name matroid-garden.com;

    ssl_certificate /etc/letsencrypt/live/matroid-garden.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/matroid-garden.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location = /signal {
        return 302 /;
    }

    location = /shadow {
        return 302 /templates/mesh-builder.html;
    }

    location = /world {
        return 302 /templates/worldbuilder.html;
    }

    location = /artifact {
        return 302 /templates/artifact-demo.html;
    }

    location = /schema {
        return 302 /templates/metacodex.html;
    }

    location = /avatar {
        return 302 /templates/avatar-builder.html;
    }

    location = /portal {
        return 302 /templates/metaverse-dashboard.html;
    }

    location = /demos {
        return 302 /demos/index.html;
    }

    location = /docs {
        return 302 /docs/;
    }

    location /docs/ {
        alias /var/www/matroid-garden/docs/;
        index index.html;
        autoindex on;
        default_type text/html;
        types {
            text/html html htm;
            text/markdown md;
            text/plain txt;
        }
        add_header Cache-Control "no-cache";
    }

    location = /archive {
        return 302 /archive/examples/;
    }

    location = /archive/examples {
        return 302 /archive/examples/;
    }

    location /archive/examples/ {
        alias /var/www/matroid-garden/archive/examples/;
        index index.html;
        autoindex on;
        add_header X-Robots-Tag "noindex, nofollow";
        add_header Cache-Control "no-cache";
    }

    location / {
        proxy_pass http://127.0.0.1:8008;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 3600;
    }
}
