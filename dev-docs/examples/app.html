<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Algorithmic Clock — Live World</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0a0a0f;
    color: #e0e0e0;
    font-family: 'Courier New', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
    gap: 20px;
  }

  h1 {
    font-size: 1.4rem;
    color: #88aaff;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 10px;
  }

  .subtitle {
    font-size: 0.75rem;
    color: #556;
    letter-spacing: 0.1em;
  }

  /* ── Top stats bar ── */
  .stats {
    display: flex;
    gap: 30px;
    flex-wrap: wrap;
    justify-content: center;
    background: #111118;
    border: 1px solid #223;
    border-radius: 6px;
    padding: 12px 24px;
    width: 100%;
    max-width: 900px;
  }

  .stat {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  .stat-label {
    font-size: 0.65rem;
    color: #556;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .stat-value {
    font-size: 1.1rem;
    color: #adf;
    font-weight: bold;
    min-width: 70px;
    text-align: center;
  }

  /* ── Grid ── */
  .grid-wrap {
    position: relative;
  }

  canvas#grid {
    border: 1px solid #223;
    border-radius: 4px;
    display: block;
    image-rendering: pixelated;
  }

  /* ── Controls ── */
  .controls {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }

  button {
    background: #1a1a2e;
    color: #88aaff;
    border: 1px solid #334;
    border-radius: 4px;
    padding: 8px 20px;
    font-family: 'Courier New', monospace;
    font-size: 0.85rem;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: background 0.15s;
  }

  button:hover { background: #22224a; }
  button.active { background: #2a2a5a; border-color: #88aaff; }

  input[type=range] {
    accent-color: #88aaff;
    width: 180px;
  }

  .control-group {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.8rem;
    color: #778;
  }

  /* ── Trace log ── */
  .trace {
    width: 100%;
    max-width: 900px;
    background: #0d0d14;
    border: 1px solid #223;
    border-radius: 6px;
    padding: 12px;
    height: 160px;
    overflow-y: auto;
    font-size: 0.72rem;
    line-height: 1.6;
    color: #667;
  }

  .trace-row { display: flex; gap: 16px; }
  .trace-row:hover { background: #111120; }

  .tc { color: #558; }       /* tick */
  .sc { color: #8af; }       /* state */
  .pc { color: #af8; }       /* position */
  .oc { color: #fa8; }       /* orbit */
  .dc { color: #f8a; }       /* diff */
  .bc { color: #a8f; }       /* band */
  .cc { font-weight: bold; } /* color swatch */
</style>
</head>
<body>

<h1>Algorithmic Clock</h1>
<p class="subtitle">deterministic · replayable · zero drift</p>

<div class="stats">
  <div class="stat">
    <span class="stat-label">Tick</span>
    <span class="stat-value" id="s-tick">0</span>
  </div>
  <div class="stat">
    <span class="stat-label">State</span>
    <span class="stat-value" id="s-state">0x0001</span>
  </div>
  <div class="stat">
    <span class="stat-label">Position</span>
    <span class="stat-value" id="s-pos">0</span>
  </div>
  <div class="stat">
    <span class="stat-label">Orbit</span>
    <span class="stat-value" id="s-orbit">0</span>
  </div>
  <div class="stat">
    <span class="stat-label">Offset</span>
    <span class="stat-value" id="s-offset">0</span>
  </div>
  <div class="stat">
    <span class="stat-label">Phase</span>
    <span class="stat-value" id="s-phase">0</span>
  </div>
  <div class="stat">
    <span class="stat-label">Diff</span>
    <span class="stat-value" id="s-diff">0</span>
  </div>
  <div class="stat">
    <span class="stat-label">Band</span>
    <span class="stat-value" id="s-band">(0,0,0)</span>
  </div>
</div>

<div class="grid-wrap">
  <canvas id="grid" width="512" height="512"></canvas>
</div>

<div class="controls">
  <button id="btn-play" class="active">▶ Play</button>
  <button id="btn-step">Step</button>
  <button id="btn-reset">Reset</button>
  <div class="control-group">
    <span>Speed</span>
    <input type="range" id="speed" min="1" max="120" value="12">
    <span id="speed-label">12 fps</span>
  </div>
  <div class="control-group">
    <span>Seed</span>
    <input type="range" id="seed-slider" min="1" max="65535" value="1">
    <span id="seed-label">0x0001</span>
  </div>
</div>

<div class="trace" id="trace">
  <div style="color:#445; padding:4px;">— tick log will appear here —</div>
</div>

<script>
// ═══════════════════════════════════════════════════════
//  KERNEL  (identical logic to kernel.py)
// ═══════════════════════════════════════════════════════

const WIDTH = 16;
const MASK  = 0xFFFF;
const C     = 0x1D1D;
const B     = [0, 1, 3, 6, 9, 8, 6, 3];
const T_LEN = B.length;          // 8
const W     = B.reduce((a, b) => a + b, 0);  // 36

function rotl(x, n) { return ((x << n) | (x >>> (WIDTH - n))) & MASK; }
function rotr(x, n) { return ((x >>> n) | (x << (WIDTH - n))) & MASK; }

function nextState(x) {
  return (rotl(x, 1) ^ rotl(x, 3) ^ rotr(x, 2) ^ C) & MASK;
}

function kernelTick(state, t) {
  return nextState((state ^ B[t % T_LEN]) & MASK);
}

function positionAt(n) {
  const full = Math.floor(n / T_LEN);
  const rem  = n % T_LEN;
  return full * W + B.slice(0, rem).reduce((a, b) => a + b, 0);
}

function recover(position) {
  return { orbit: Math.floor(position / W), offset: position % W };
}

// ═══════════════════════════════════════════════════════
//  PROJECTION
// ═══════════════════════════════════════════════════════

function classify(x) {
  x &= MASK;
  const width   = x === 0 ? 0 : (16 - Math.clz32(x));
  let density   = 0;
  let texture   = 0;
  for (let i = 0; i < 16; i++) {
    if ((x >> i) & 1) density++;
    if (((x >> i) & 1) !== ((x >> ((i + 1) % 16)) & 1)) texture++;
  }
  return [width, density, texture];
}

function toColor(state) {
  const r = (state >> 8) & 0xFF;
  const g = ((state >> 4) & 0x0F) * 17;
  const b = (state & 0x0F) * 17;
  return `rgb(${r},${g},${b})`;
}

// ═══════════════════════════════════════════════════════
//  WORLD STATE
// ═══════════════════════════════════════════════════════

let seed      = 1;
let t         = 0;
let state     = seed;
let position  = 0;
let running   = true;
let fps       = 12;
let animFrame = null;
let lastTime  = 0;

// Grid: 64×64 cells, each storing the last state that landed there
const GRID_W = 64;
const GRID_H = 64;
const grid   = new Uint16Array(GRID_W * GRID_H);

// Trail buffer: last 200 positions for color fade
const TRAIL_MAX = 200;
const trail = [];

function reset() {
  t        = 0;
  state    = seed & MASK;
  position = 0;
  trail.length = 0;
  grid.fill(0);
  document.getElementById('trace').innerHTML =
    '<div style="color:#445; padding:4px;">— reset —</div>';
}

// ═══════════════════════════════════════════════════════
//  ONE TICK
// ═══════════════════════════════════════════════════════

function step() {
  const diff = B[t % T_LEN];
  const { orbit, offset } = recover(position);
  const band = classify(state);

  // Update grid
  const gx = state % GRID_W;
  const gy = Math.floor(state / GRID_W) % GRID_H;
  grid[gy * GRID_W + gx] = state;

  // Trail
  trail.push({ gx, gy, state, t });
  if (trail.length > TRAIL_MAX) trail.shift();

  // Update stats display
  document.getElementById('s-tick').textContent   = t;
  document.getElementById('s-state').textContent  = `0x${state.toString(16).toUpperCase().padStart(4,'0')}`;
  document.getElementById('s-pos').textContent    = position;
  document.getElementById('s-orbit').textContent  = orbit;
  document.getElementById('s-offset').textContent = offset;
  document.getElementById('s-phase').textContent  = t % T_LEN;
  document.getElementById('s-diff').textContent   = diff;
  document.getElementById('s-band').textContent   = `(${band[0]},${band[1]},${band[2]})`;

  // Trace log (keep last 80 rows)
  const traceEl = document.getElementById('trace');
  if (t % 8 === 0 || t < 32) {
    const row = document.createElement('div');
    row.className = 'trace-row';
    row.innerHTML =
      `<span class="tc">t=${String(t).padStart(5)}</span>` +
      `<span class="sc">state=0x${state.toString(16).toUpperCase().padStart(4,'0')}</span>` +
      `<span class="pc">pos=${String(position).padStart(6)}</span>` +
      `<span class="oc">orbit=${orbit}</span>` +
      `<span class="dc">diff=${diff}</span>` +
      `<span class="bc">band=(${band.join(',')})</span>` +
      `<span class="cc" style="color:${toColor(state)}">■</span>`;
    traceEl.appendChild(row);
    // Trim old rows
    while (traceEl.children.length > 80) traceEl.removeChild(traceEl.firstChild);
    traceEl.scrollTop = traceEl.scrollHeight;
  }

  // Advance
  position += diff;
  state     = kernelTick(state, t);
  t++;
}

// ═══════════════════════════════════════════════════════
//  RENDER GRID
// ═══════════════════════════════════════════════════════

const canvas  = document.getElementById('grid');
const ctx     = canvas.getContext('2d');
const CELL    = canvas.width / GRID_W;   // 8px per cell

function render() {
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Draw all non-zero cells dimly
  for (let cy = 0; cy < GRID_H; cy++) {
    for (let cx = 0; cx < GRID_W; cx++) {
      const s = grid[cy * GRID_W + cx];
      if (s === 0) continue;
      ctx.fillStyle = toColor(s);
      ctx.globalAlpha = 0.18;
      ctx.fillRect(cx * CELL, cy * CELL, CELL, CELL);
    }
  }

  // Draw trail with fade
  for (let i = 0; i < trail.length; i++) {
    const { gx, gy, state: ts } = trail[i];
    const age   = trail.length - i;
    const alpha = Math.max(0.05, 1 - age / TRAIL_MAX);
    ctx.globalAlpha = alpha;
    ctx.fillStyle   = toColor(ts);
    ctx.fillRect(gx * CELL, gy * CELL, CELL, CELL);
  }

  // Draw current position bright
  if (trail.length > 0) {
    const cur = trail[trail.length - 1];
    ctx.globalAlpha = 1;
    ctx.fillStyle   = '#ffffff';
    ctx.fillRect(cur.gx * CELL + 1, cur.gy * CELL + 1, CELL - 2, CELL - 2);
    ctx.fillStyle = toColor(cur.state);
    ctx.fillRect(cur.gx * CELL + 2, cur.gy * CELL + 2, CELL - 4, CELL - 4);
  }

  ctx.globalAlpha = 1;

  // Orbit boundary lines every 36 position units — faint grid
  ctx.strokeStyle = '#1a1a2e';
  ctx.lineWidth   = 0.5;
  for (let i = 0; i <= GRID_W; i += 4) {
    ctx.beginPath();
    ctx.moveTo(i * CELL, 0);
    ctx.lineTo(i * CELL, canvas.height);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(0, i * CELL);
    ctx.lineTo(canvas.width, i * CELL);
    ctx.stroke();
  }
}

// ═══════════════════════════════════════════════════════
//  ANIMATION LOOP
// ═══════════════════════════════════════════════════════

function loop(now) {
  animFrame = requestAnimationFrame(loop);
  if (!running) { render(); return; }
  if (now - lastTime < 1000 / fps) return;
  lastTime = now;

  // Run multiple steps per frame at high speed
  const stepsPerFrame = fps > 60 ? Math.floor(fps / 30) : 1;
  for (let i = 0; i < stepsPerFrame; i++) step();
  render();
}

// ═══════════════════════════════════════════════════════
//  CONTROLS
// ═══════════════════════════════════════════════════════

document.getElementById('btn-play').addEventListener('click', () => {
  running = !running;
  document.getElementById('btn-play').textContent = running ? '⏸ Pause' : '▶ Play';
  document.getElementById('btn-play').classList.toggle('active', running);
});

document.getElementById('btn-step').addEventListener('click', () => {
  running = false;
  document.getElementById('btn-play').textContent = '▶ Play';
  document.getElementById('btn-play').classList.remove('active');
  step();
  render();
});

document.getElementById('btn-reset').addEventListener('click', () => {
  reset();
  render();
});

document.getElementById('speed').addEventListener('input', e => {
  fps = parseInt(e.target.value);
  document.getElementById('speed-label').textContent = `${fps} fps`;
});

document.getElementById('seed-slider').addEventListener('input', e => {
  seed = parseInt(e.target.value);
  document.getElementById('seed-label').textContent =
    `0x${seed.toString(16).toUpperCase().padStart(4,'0')}`;
  reset();
});

// ── Start ──
requestAnimationFrame(loop);
</script>
</body>
</html>
