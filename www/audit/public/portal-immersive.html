<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Portal Immersive</title>
    <style>
      html, body { height: 100%; margin: 0; background: #0b1022; color: #e5e7eb; font-family: system-ui, sans-serif; }
      .hud {
        position: fixed; left: 12px; top: 12px; z-index: 10;
        background: rgba(17,24,39,0.86); border: 1px solid rgba(148,163,184,0.25);
        border-radius: 12px; padding: 10px 12px; max-width: 520px;
      }
      .hud .title { font-weight: 700; font-size: 14px; margin-bottom: 4px; }
      .hud .meta { font-size: 12px; opacity: 0.8; }
      .hud .row { margin-top: 8px; display: flex; gap: 8px; flex-wrap: wrap; }
      .hud a, .hud button {
        appearance: none; border: 1px solid rgba(148,163,184,0.35);
        background: rgba(15,23,42,0.8); color: #e5e7eb; border-radius: 10px;
        padding: 8px 10px; cursor: pointer; text-decoration: none; font-size: 12px;
      }
      .hud .bad { color: #fca5a5; }
      .hud .good { color: #86efac; }
    </style>
    <!-- Local-first A-Frame; CDN fallback for convenience. -->
    <script src="./aframe.min.js"></script>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  </head>
  <body>
    <div class="hud">
      <div class="title">Immersive Portal</div>
      <div class="meta" id="meta">Loading…</div>
      <div class="row">
        <a id="openReplay" href="#" target="_blank" rel="noopener">Open replay</a>
        <a id="openScene" href="#" target="_blank" rel="noopener">Open portal-scene.json</a>
        <a id="openWaveform" href="#" target="_blank" rel="noopener">Open waveform scene</a>
        <button id="recenter" type="button">Recenter</button>
      </div>
      <div class="meta" style="margin-top:6px">Tip: use A-Frame “Enter VR” / “Enter AR” buttons when available.</div>
    </div>

    <a-scene
      renderer="antialias: true; colorManagement: true"
      background="color: #0b1022"
      vr-mode-ui="enabled: true"
      embedded
    >
      <a-assets id="assets"></a-assets>

      <a-entity id="rig" position="0 1.6 4">
        <a-camera id="camera" look-controls="enabled: true" wasd-controls="enabled: true">
          <a-cursor
            fuse="false"
            rayOrigin="mouse"
            material="color: #93c5fd; shader: flat"
          ></a-cursor>
        </a-camera>
      </a-entity>

      <a-entity light="type: ambient; intensity: 0.65"></a-entity>
      <a-entity light="type: directional; intensity: 0.9" position="1 3 2"></a-entity>

      <a-plane rotation="-90 0 0" width="200" height="200" color="#0f172a"></a-plane>
      <a-entity id="world"></a-entity>
    </a-scene>

    <script src="./portal-immersive.js"></script>
  </body>
</html>
